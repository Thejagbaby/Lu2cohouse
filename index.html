<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="/favicon.png" type="image/png" sizes="32x32">
  <link rel="apple-touch-icon" href="/favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LU2CO HOUSE</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #site-frame {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      border: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .loader {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      z-index: 10;
      pointer-events: none;
    }
    .dot-ring {
      width: 40px; height: 40px;
      border: 1.5px solid rgba(255,255,255,0.12);
      border-top-color: rgba(255,255,255,0.6);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="dot-ring"></div>
  </div>
  <iframe id="site-frame" src="" title="LU2CO HOUSE"></iframe>
  <script>
    (function () {
      var w = window.innerWidth;
      var path;

      if (w <= 767) {
        path = './sites/lu2co-mobile/index.html';
      } else if (w >= 1600) {
        path = './sites/lu2co-desktop/index.html';
      } else {
        path = './sites/lu2co-laptop/index.html';
      }

      var frame = document.getElementById('site-frame');
      var loader = document.getElementById('loader');

      frame.src = path;
      frame.onload = function () {
        frame.style.opacity = '1';
        loader.style.display = 'none';
      };
    })();
  </script>
</body>
</html>
