  <style>

    :root {
      --bg:         #121717;
      --bg-card:    #1a1f1f;
      --green:      #254441;
      --white:      #ffffff;
      --dim:        rgba(255,255,255,.42);
      --dimmer:     rgba(255,255,255,.22);
      --font-serif: "Cormorant Garamond", Georgia, serif;
      --font-sans:  "Inter", system-ui, sans-serif;
      --gap:        59px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: var(--bg);
      overflow-x: hidden;
    }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    a { color: inherit; text-decoration: none; }

        /* ── NAV ── */
    #nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 400;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 3rem;
      background: transparent;
      transition: background 0.4s ease, box-shadow 0.4s ease;
    }
    #nav.scrolled {
      background: rgba(0,0,0,0.01);
      backdrop-filter: blur(1px);
      -webkit-backdrop-filter: blur(1px);
      box-shadow: 0 1px 6px rgba(0,0,0,0.04);
    }
    .nav-logo {
      display: flex; align-items: center;
      text-decoration: none; padding: 0;
    }
    .nav-logo img {
      height: 58px; width: auto;
      object-fit: contain; display: block;
      border-radius: 4px;
      mix-blend-mode: lighten;
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.15));
    }
    .nav-book {
      font-family: var(--font-sans);
      font-size: .58rem; font-weight: 300;
      letter-spacing: .13em; text-transform: uppercase;
      color: var(--black-900, #121717);
      background: var(--white, #fff);
      text-decoration: none;
      border: 1px solid var(--white, #fff);
      padding: .42rem 1.1rem; border-radius: 999px;
      transition: background .25s ease, color .25s ease, border-color .25s ease;
    }
    .nav-book:hover  { background: transparent; color: var(--white, #fff); border-color: var(--white, #fff); }
    .nav-book:active { opacity: .8; }
    .nav-ham {
      display: flex; flex-direction: column; justify-content: center; align-items: flex-start; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 8px;
      z-index: 401; flex-shrink: 0;
    }
    .nav-ham span {
      display: block; height: 2px; background: #fff;
      transition: width 0.3s ease, transform 0.35s ease, opacity 0.3s ease;
      transform-origin: center;
    }
    .nav-ham span:nth-child(1) { width: 52px; }
    .nav-ham span:nth-child(2) { width: 36px; margin-left: 8px; }
    .nav-ham span:nth-child(3) { width: 52px; }
    .nav-ham.is-open span:nth-child(1) { width: 36px; transform: translateY(7px) rotate(45deg); }
    .nav-ham.is-open span:nth-child(2) { opacity: 0; width: 0; }
    .nav-ham.is-open span:nth-child(3) { width: 36px; transform: translateY(-7px) rotate(-45deg); }
    /* ── MOBILE MENU ── */
    .mob-menu {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      z-index: 300;
      background: #121717;
      display: flex; flex-direction: column;
      padding: 80px 1.8rem 1.5rem;
      overflow-y: auto;
      opacity: 0; visibility: hidden;
      transform: translateY(-100%);
      transition: opacity 1.1s cubic-bezier(0.22,1,0.36,1), visibility 1.1s ease, transform 1.1s cubic-bezier(0.22,1,0.36,1);
    }
    .mob-menu.is-open { opacity: 1; visibility: visible; transform: translateY(0); }
    .mob-menu.is-closing {
      transform: translateX(-100%);
      opacity: 1;
      transition: transform 0.6s cubic-bezier(0.4,0,0.6,1) !important;
    }
    .mob-menu-inner {
      display: flex; flex-direction: column;
      gap: 0; width: 100%; flex: 1;
      justify-content: center;
    }
    .mob-link {
      font-family: var(--font-sans);
      font-size: clamp(1.2rem, 5.2vw, 1.7rem);
      font-weight: 300;
      color: rgba(255,255,255,0.55);
      text-decoration: none;
      letter-spacing: -0.03em;
      line-height: 1.3;
      padding: 0.35rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      opacity: 0;
      transform: translateY(-22px);
      transition: color 0.2s ease, opacity 0.55s cubic-bezier(0.22,1,0.36,1), transform 0.55s cubic-bezier(0.22,1,0.36,1);
    }
    .mob-menu.is-open .mob-link:nth-child(1) { opacity: 1; transform: translateY(0); transition-delay: 0.15s; }
    .mob-menu.is-open .mob-link:nth-child(2) { opacity: 1; transform: translateY(0); transition-delay: 0.22s; }
    .mob-menu.is-open .mob-link:nth-child(3) { opacity: 1; transform: translateY(0); transition-delay: 0.29s; }
    .mob-menu.is-open .mob-link:nth-child(4) { opacity: 1; transform: translateY(0); transition-delay: 0.36s; }
    .mob-menu.is-open .mob-link:nth-child(5) { opacity: 1; transform: translateY(0); transition-delay: 0.43s; }
    .mob-menu.is-open .mob-link:nth-child(6) { opacity: 1; transform: translateY(0); transition-delay: 0.50s; }
    .mob-menu.is-open .mob-link:nth-child(7) { opacity: 1; transform: translateY(0); transition-delay: 0.57s; }
    .mob-link--active { color: #fff !important; font-weight: 500; }
    .mob-link:active { color: #fff; }
    .mob-etsy-logo-wrap {
      
      display: flex; justify-content: center;
      padding: 1.2rem 0 0.5rem;
      opacity: 0;
      transition: opacity 0.75s ease;
    }
    .mob-menu.is-open .mob-etsy-logo-wrap {
      opacity: 1;
      transition-delay: 1.7s;
    }
    .mob-etsy-logo {
      font-family: 'Libre Baskerville', Georgia, serif;
      font-size: 1.6rem; font-weight: 700;
      letter-spacing: 0.01em; color: #fff;
      text-decoration: none;
      animation: mob-etsy-glow 2.4s ease-in-out infinite;
    }
    @keyframes mob-etsy-glow {
      0%   { opacity: 0.82; filter: drop-shadow(0 0 4px rgba(255,255,255,0.25)); }
      40%  { opacity: 0.92; filter: drop-shadow(0 0 16px rgba(255,255,255,0.6)); }
      60%  { opacity: 1;    filter: drop-shadow(0 0 32px rgba(255,255,255,0.95)) drop-shadow(0 0 70px rgba(255,255,255,0.55)); }
      80%  { opacity: 0.92; filter: drop-shadow(0 0 16px rgba(255,255,255,0.6)); }
      100% { opacity: 0.82; filter: drop-shadow(0 0 4px rgba(255,255,255,0.25)); }
    }


    /* ── PAGE HEADER ── */
    .page-header { flex-shrink: 0;
      position: relative;
      padding-top: 5rem; /* nav height */
      overflow: hidden;
    }

    /* the huge heading sits behind the grid, partially visible at top */
    .page-heading-wrap {
      position: relative;
      padding: 1.5rem 2.5rem 0.5rem;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      overflow: hidden;
    }

    .page-label {
      font-family: var(--font-sans);
      font-size: .6875rem; font-weight: 300;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--dimmer);
      padding-bottom: .5rem;
      flex-shrink: 0;
    }

    .page-heading-clip {
      overflow: hidden;
      line-height: 1.0;
    }

    .page-heading {
      font-family: 'Dream Avenue', var(--font-serif);
      font-style: normal;
      font-weight: 400;
      font-size: clamp(3rem, 7vw, 7.5rem);
      line-height: 1.0;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      background: linear-gradient(to bottom, #ffffff 50%, #ac7c47 50%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      white-space: nowrap;
      display: block;
      will-change: transform;
    }

    .page-count {
      font-family: var(--font-sans);
      font-size: .6875rem; font-weight: 300;
      letter-spacing: .1em;
      color: var(--dimmer);
      padding-bottom: .5rem;
      flex-shrink: 0;
    }

    /* ── GRID ── */
    .grid-wrap {
      padding: 1.5rem 238px 6rem;
      box-sizing: border-box;
      width: 100%;
    }

    .product-grid {
      display: flex;
      align-items: flex-start;
      gap: var(--gap);
      width: 100%;
      position: relative;
    }

    .grid-col {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* all columns start aligned — parallax applied via JS */

    /* ── INTRO CARD ── */
    .card-intro {
      position: relative;
      background: var(--green);
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2rem 1.75rem;
      overflow: hidden;
    }
    .card-intro::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(255,255,255,.025) 0%, transparent 65%);
      pointer-events: none;
    }
    .intro-eyebrow {
      font-family: var(--font-sans);
      font-size: .6rem; font-weight: 300;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--dimmer);
    }
    .intro-title {
      font-family: var(--font-serif);
      font-style: italic; font-weight: 300;
      font-size: clamp(1.6rem, 2.8vw, 3rem);
      line-height: 1.2;
      color: rgba(255,255,255,.7);
      max-width: 14ch;
    }
    .intro-meta {
      font-family: var(--font-sans);
      font-size: .6rem; font-weight: 300;
      letter-spacing: .14em; text-transform: uppercase;
      color: rgba(255,255,255,.2);
      line-height: 1.9;
    }

    /* ── PRODUCT CARD ── */
    .card-product {
      position: relative;
      width: 100%; height: 100%;
      overflow: hidden;
      cursor: pointer;
      display: block;
    }

    .card-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      transform: scale(1.0);
      transition: transform 1.1s cubic-bezier(.25,.46,.45,.94);
      will-change: transform;
    }
    .card-product:hover .card-img { transform: scale(1.06); }

    .card-scrim {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to top,
        rgba(18,23,23,.88) 0%,
        rgba(18,23,23,.32) 50%,
        rgba(18,23,23,.06) 75%
      );
      pointer-events: none;
      z-index: 1;
      opacity: 0;
      transition: opacity .4s ease;
    }
    .card-product:hover .card-scrim { opacity: 1; }


    /* card info — hidden until hover */
    .card-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      z-index: 2;
      padding: 1.5rem 1.4rem 1.6rem;
      display: flex;
      flex-direction: column;
      gap: .5rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .3s ease, transform .3s ease;
    }
    .card-product:hover .card-info {
      opacity: 1;
      transform: translateY(0);
    }

    .card-name {
      font-family: var(--font-sans);
      font-style: normal;
      font-weight: 600;
      font-size: .72rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      line-height: 1.3;
      color: rgba(255,255,255,.88);
    }

    .card-sub {
      font-family: var(--font-sans);
      font-size: .6rem; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase;
      color: rgba(255,255,255,.38);
    }

    /* CTA — lives inside card-info, flows below the name */
    .card-cta {
      margin-top: .6rem;
      display: flex; gap: .6rem; flex-wrap: wrap; align-items: center;
    }
    .card-btn {
      font-family: var(--font-sans);
      font-size: .55rem; font-weight: 300;
      letter-spacing: .16em; text-transform: uppercase;
      color: var(--white);
      border: 1px solid rgba(255,255,255,.32);
      padding: .55rem 1.2rem; border-radius: 999px;
      background: transparent;
      transition: background .22s ease, border-color .22s ease;
      display: inline-block;
    }
    .card-btn:hover { background: rgba(255,255,255,.1); border-color: rgba(255,255,255,.65); }
    .card-btn:focus-visible { outline: 1px solid rgba(255,255,255,.5); outline-offset: 3px; }
    .card-btn:active { opacity: .7; }
    .card-btn--buy { background: rgba(255,255,255,.92); color: #1a1f1f; border-color: transparent; text-decoration: none; transition: background .22s ease, transform .22s cubic-bezier(.34,1.56,.64,1), box-shadow .22s ease; }
    .card-btn--buy:hover { background: #fff; border-color: transparent; opacity: 1; transform: scale(1.07); box-shadow: 0 6px 22px rgba(255,255,255,.3); }

    .card-reveal {
      width: 100%;
      aspect-ratio: 407 / 517;
    }

    /* ── BESTSELLER BADGE (modal image) ── */
    .pm-badge {
      position: absolute;
      top: 1rem;
      left: 1rem;
      z-index: 10;
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: #F5C518;
      color: #1a1204;
      font-family: var(--font-sans);
      font-size: .6rem;
      font-weight: 700;
      letter-spacing: .04em;
      padding: .4rem .9rem .4rem .7rem;
      border-radius: 999px;
      pointer-events: none;
    }
    .pm-badge svg {
      flex-shrink: 0;
      width: 15px;
      height: 15px;
    }
    .pm-badge span {
      text-decoration: underline;
      text-decoration-style: dashed;
      text-underline-offset: 2px;
      text-decoration-thickness: 1px;
    }

    /* ── LEFT SIDE NAV ── */
    .side-nav {
      position: fixed;
      left: 2.5rem;
      top: 50%;
      transform: translateY(-50%);
      z-index: 100;
      display: flex;
      flex-direction: column;
      gap: 1.1rem;
      overflow: hidden;
      padding: 4px 0; /* prevent clip on entrance animation */
    }

    .side-nav-item {
      display: flex;
      flex-direction: column;
      gap: .3rem;
      cursor: default;
    }

    .side-nav-item.is-next {
      cursor: pointer;
    }

    .side-nav-name {
      font-family: var(--font-sans);
      font-weight: 600;
      font-size: 1.35rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--white);
      line-height: 1;
      text-decoration: none;
      display: block;
      transition: opacity .25s ease;
    }

    .side-nav-item.is-next .side-nav-name {
      color: rgba(255,255,255,.28);
      font-size: 1rem;
    }

    .side-nav-item.is-next:hover .side-nav-name {
      color: rgba(255,255,255,.55);
    }

    .side-nav-sub {
      font-family: var(--font-sans);
      font-size: .6rem;
      font-weight: 300;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: rgba(255,255,255,.3);
      line-height: 1;
    }

    .side-nav-item.is-next .side-nav-sub {
      display: none;
    }

    /* ── FOOTER ── */
    .page-footer { flex-shrink: 0;
      padding: 2.2rem 3rem;
      border-top: 1px solid rgba(255,255,255,.055);
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 2rem;

    .footer-col { display: flex; flex-direction: column; gap: .35rem; }
    .footer-top {

      font-size: .72rem; font-weight: 500;
      letter-spacing: .06em;
      color: rgba(255,255,255,.82);

    .footer-top--upper { text-transform: uppercase; letter-spacing: .14em; }
    .footer-sub {
      font-family: var(--font-sans);
      font-size: .68rem; font-weight: 300;
      color: rgba(255,255,255,.38);
    }
    .footer-logo {

      font-size: .6875rem; font-weight: 300;
      letter-spacing: 0.016em;
      color: rgba(255,255,255,.2);

    .footer-copy {
      font-family: var(--font-sans);
      font-size: .6875rem; font-weight: 300;
      color: rgba(255,255,255,.2);

    /* ── BACKDROP ── */
    .pm-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: rgba(0,0,0,.42);
      opacity: 0;
      pointer-events: none;
    }

    /* ── PRODUCT MODAL ── */
    .prod-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .45s ease, visibility .45s ease;
    }
    .prod-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: all;
    }
    .pm-panel {
      position: relative;
      z-index: 1;
      width: 75%;
      max-width: 950px;
      height: 82vh;
      display: flex;
      flex-direction: column;
      border-radius: 14px;
      overflow-y: auto;
      overflow-x: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,.55), 0 8px 24px rgba(0,0,0,.3);
    }

    /* LEFT — image area */
    .pm-left {
      position: relative;
      height: 68vh;
      min-height: 68vh;
      flex-shrink: 0;
      overflow: hidden;
      background: var(--bg);
      z-index: 1;
    }
    .pm-main {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }
    .pm-main-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0;
      transition: opacity .55s ease;
    }
    .pm-main-img.is-active { opacity: 1; }

    /* thumbnails strip */
    .pm-thumbs {
      position: absolute;
      bottom: 2rem;
      left: 2rem;
      z-index: 10;
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      max-width: calc(100% - 4rem);
    }
    .pm-thumb {
      width: 5.5rem;
      height: 5.5rem;
      object-fit: cover;
      object-position: center top;
      cursor: pointer;
      opacity: .5;
      border: 2px solid transparent;
      transition: opacity .25s ease, border-color .25s ease;
      flex-shrink: 0;
    }
    .pm-thumb.is-active {
      opacity: 1;
      border-color: rgba(255,255,255,.7);
    }
    .pm-thumb:hover { opacity: .85; }

    /* RIGHT — info panel */
    .pm-right {
      position: relative;
      height: auto;
      flex-shrink: 0;
      z-index: 1;
      overflow-y: visible;
      overflow-x: hidden;
      padding: 1.5rem 2.5rem 3rem;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      border-top: 1px solid rgba(255,255,255,.06);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.12) transparent;
    }

    .pm-close {
      position: absolute;
      top: 1rem; right: 1rem;
      z-index: 20;
      width: 2.25rem; height: 2.25rem;
      border: 1px solid rgba(255,255,255,.12);
      background: rgba(255,255,255,.07);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      color: rgba(255,255,255,.6);
      font-size: 0;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background .2s ease, border-color .2s ease, color .2s ease, transform .22s cubic-bezier(.34,1.56,.64,1);
    }
    .pm-close::before, .pm-close::after {
      content: '';
      position: absolute;
      width: 15px; height: 1.5px;
      background: currentColor;
      border-radius: 2px;
    }
    .pm-close::before { transform: rotate(45deg); }
    .pm-close::after  { transform: rotate(-45deg); }
    .pm-close:hover {
      background: rgba(255,255,255,.14);
      border-color: rgba(255,255,255,.28);
      color: #fff;
      transform: rotate(90deg);
    }

    .pm-brand {
      margin-bottom: 1rem;
    }
    .pm-brand img {
      height: 60px;
      width: auto;
      mix-blend-mode: lighten;
      opacity: .75;
    }

    .pm-title {
      font-family: var(--font-sans);
      font-style: normal;
      font-weight: 600;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      line-height: 1.2;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,.95);
      margin: 0 0 0.75rem;
    }

    .pm-divider {
      border: none;
      border-top: 2px solid rgba(255,255,255,0.7);
      margin: 0.75rem 0 1.8rem;
      width: 100%;
      flex-shrink: 0;
    }

    .pm-desc {
      font-family: var(--font-sans);
      font-size: .8125rem;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(255,255,255,.6);
      margin: 0 0 2.5rem;
      max-width: 44ch;
    }

    .pm-btn {
      display: inline-block;
      align-self: flex-start;
      font-family: var(--font-sans);
      font-size: .6rem;
      font-weight: 400;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--white);
      text-decoration: none;
      border: 1px solid var(--white);
      padding: .85rem 2.2rem;
      border-radius: 999px;
      transition: background .25s ease, color .25s ease;
      margin-bottom: 3.5rem;
    }
    .pm-btn:hover { background: transparent; color: var(--white); }
    .pm-btn:focus-visible { outline: 1px solid rgba(255,255,255,.5); outline-offset: 3px; }

    .pm-stats {
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 2rem;
    }
    .pm-stat-label {
      font-family: var(--font-sans);
      font-size: .6rem;
      font-weight: 300;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: rgba(255,255,255,.38);
      margin-bottom: .6rem;
    }
    .pm-stat-val {
      font-family: var(--font-serif);
      font-weight: 300;
      font-size: clamp(3.5rem, 6vw, 6rem);
      line-height: 1;
      color: var(--white);
      letter-spacing: -.02em;
    }
    .pm-stat-unit {
      font-family: var(--font-serif);
      font-style: italic;
      font-size: .9rem;
      font-weight: 300;
      color: rgba(255,255,255,.5);
      margin-left: .4rem;
    }
    .pm-desc-block { margin-bottom: 1.1rem; }
    .pm-desc-label {
      font-family: var(--font-sans);
      font-size: .55rem; font-weight: 500;
      letter-spacing: .2em; text-transform: uppercase;
      color: rgba(255,255,255,.38);
      margin-bottom: .35rem;
    }
    .pm-desc-text {
      font-family: var(--font-sans);
      font-size: .78rem; font-weight: 300;
      line-height: 1.65; color: rgba(255,255,255,.62);
    }
    .pm-desc-list {
      list-style: none; margin: 0; padding: 0;
      font-family: var(--font-sans);
      font-size: .78rem; font-weight: 300;
      line-height: 1.8; color: rgba(255,255,255,.62);
    }
    .pm-desc-list li::before { content: '· '; color: rgba(255,255,255,.3); }
    .pm-desc-note {
      font-family: var(--font-sans);
      font-size: .72rem; font-weight: 300;
      line-height: 1.7; color: rgba(255,255,255,.9);
      margin-top: .8rem;
      border-top: 1px solid rgba(255,255,255,.07);
      padding-top: .8rem;
    }

    .pm-stat-sub {
      font-family: var(--font-sans);
      font-size: .7rem;
      font-weight: 300;
      color: rgba(255,255,255,.3);
      margin-top: .4rem;
      letter-spacing: .04em;
    }

    /* ── PAGE STARS ── */
    #page-stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      contain: layout style paint;
    }
    @keyframes yt-float {
      0%   { transform: translateY(0)     scale(1);    opacity: .7; }
      50%  { transform: translateY(-22px) scale(1.08); opacity: 1;  }
      100% { transform: translateY(-5px)  scale(0.94); opacity: .5; }
    }
    @keyframes yt-twinkle {
      0%   { transform: translateY(0)     scale(0.85) rotate(0deg);  opacity: .08; }
      35%  { transform: translateY(-14px) scale(1.2)  rotate(15deg); opacity: .45; }
      65%  { transform: translateY(-8px)  scale(0.9)  rotate(-8deg); opacity: .18; }
      100% { transform: translateY(-20px) scale(1.05) rotate(22deg); opacity: .55; }
    }
    @keyframes yt-drift {
      0%   { transform: translate(0,0)        scale(1)    rotate(0deg);  opacity: .12; }
      40%  { transform: translate(8px,-18px)  scale(1.15) rotate(12deg); opacity: .38; }
      80%  { transform: translate(-6px,-10px) scale(0.88) rotate(-5deg); opacity: .2;  }
      100% { transform: translate(4px,-24px)  scale(1.1)  rotate(18deg); opacity: .42; }
    }

    /* ── BIG SCREEN (≥ 1600px) ── */
    @media (min-width: 1600px) {
      .grid-wrap {
        padding-left: max(300px, 18vw);
        padding-right: max(300px, 18vw);
      }

      .nav-link     { font-size: 0.85rem; }
      .nav-links    { gap: 2.5rem; }
      .side-nav     { left: 6rem; gap: 1.8rem; }
      .product-grid { gap: 90px; }
      .grid-col     { gap: 90px; }
      .side-nav-name { font-size: 2.4rem; }
      .side-nav-item.is-next .side-nav-name { font-size: 1.8rem; }
      .side-nav-item.is-prev .side-nav-name { font-size: 1.8rem; }
      .side-nav-sub  { font-size: 0.75rem; }
      .prod-modal { grid-template-columns: 1.2fr 1fr; }
      .pm-right        { padding: 2.5rem 4rem 6rem; }
      .pm-brand img    { height: 90px; }
      .pm-title        { font-size: clamp(2rem, 2.8vw, 3.2rem); margin-bottom: 1.2rem; }
      .pm-divider      { margin: 1.2rem 0 3rem; }
      .pm-desc-label   { font-size: 0.82rem; margin-bottom: 0.6rem; letter-spacing: .18em; }
      .pm-desc-text    { font-size: 1.15rem; line-height: 1.85; }
      .pm-desc-list    { font-size: 1.15rem; line-height: 2.1; }
      .pm-desc-note    { font-size: 1rem; line-height: 1.8; padding-top: 1.2rem; margin-top: 1.2rem; }
      .pm-desc-block   { margin-bottom: 2rem; }
      .pm-btn          { font-size: 0.82rem; padding: 1.3rem 4rem; margin-bottom: 3rem; }
      .pm-stat-label   { font-size: 0.78rem; }
      .pm-stats        { margin-top: 1rem; }
      .pm-desc         { font-size: 1.1rem; max-width: none; }
      .pm-close        { width: 2.5rem; height: 2.5rem; font-size: 1rem; top: 2rem; right: 2rem; }
    }

    /* hide ham on desktop only */
    @media (min-width: 768px) {
      .nav-ham { display: none; }
      .mob-menu { display: none; }
    }
    .pss { display: none; }
    .pm-carousel { display: none; }
    .pm-dots { display: none; justify-content: center; align-items: center; gap: 5px; }
    .pm-dot { height: 6px; width: 6px; border-radius: 3px; background: rgba(255,255,255,.45); transition: width .25s ease, background .25s ease; flex-shrink: 0; }
    .pm-dot.is-active { width: 22px; background: #fff; }
    .pm-stats-row { display: none; }
    .pm-reviews-section { display: none; }

    /* ══ MOBILE (≤ 767px) ══ */
    @media (max-width: 767px) {
      /* NAV — match home page mobile exactly */
      #nav {
        padding: 16px 1.4rem 0;

      }
      .nav-logo img { height: 70px; filter: brightness(1.6) drop-shadow(0 0 8px rgba(255,220,140,0.7)); }
      /* .nav-book visible on mobile too */

      /* PSS — product scroll showcase */

        background: var(--black-900);
      }
      .pss-eyebrow-wrap { padding: 2.5rem 1.5rem 0.8rem; }
      .pss-eyebrow {

        color: rgba(255,255,255,0.3);
      }
      .pss-track {
        display: flex;
        overflow-x: auto;

      }
      .pss-track::-webkit-scrollbar { display: none; }

      .pss-card {
        flex: 0 0 88vw; width: 88vw;

      }
      .pss-card-img {

      }
      .pss-card:active .pss-card-img { transform: scale(1.03); }
      .pss-card-overlay {

        pointer-events: none;
      }
      .pss-card-name {
        position: absolute; bottom: 1.1rem; left: 1.1rem; right: 1.1rem;
        font-family: var(--font-serif); font-style: italic;
        font-size: clamp(2.2rem, 10vw, 4rem);

      }
      .pss-detail-btn {
        font-family: var(--font-sans); font-size: 0.58rem;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: rgba(255,255,255,0.72); background: none;
        border: 1px solid rgba(255,255,255,0.2); border-radius: 999px;
        padding: 0.42rem 1rem; cursor: pointer; white-space: nowrap;
      }
      .pss-detail-btn:active { opacity: 0.6; }
      .pss-buy-btn {
        font-family: var(--font-sans); font-size: 0.58rem;
        letter-spacing: 0.1em; text-transform: uppercase;
        color: #121717; background: rgba(255,255,255,0.92);

        text-decoration: none; white-space: nowrap; display: block;
      }
      .pss-buy-btn:active { opacity: 0.7; }
      .product-grid { gap: 12px; }
      .grid-col { gap: 12px; }
      /* Disable parallax column offset (columns sit at same y) */
      .grid-col:nth-child(2) { margin-top: 0 !important; transform: none !important; }

      /* SIDE NAV — hide on mobile */
      .side-nav { display: none; }

      /* PRODUCT CARD */
      .prod-card { border-radius: 8px; }

      .prod-card-name { font-size: 0.72rem; }

      /* PRODUCT MODAL — Etsy-style mobile */

      .pm-carousel::-webkit-scrollbar { display: none; }

      .pm-dots { display: flex; position: absolute; bottom: 10px; left: 0; right: 0; padding: 0; background: transparent; z-index: 5; pointer-events: none; gap: 5px; justify-content: center; }
      .pm-dot { width: 5px; height: 5px; border-radius: 50%; background: rgba(255,255,255,.35); flex-shrink: 0; transition: background .2s ease; }
      .pm-dot.is-active { width: 5px; background: #fff; }
      .pm-close { position: fixed; top: 0.75rem; right: 0.75rem; z-index: 600; background: rgba(0,0,0,.38); border-color: rgba(255,255,255,.18); }

      .pm-title { font-size: 1.1rem; letter-spacing: .08em; margin-bottom: 0.4rem; }

/* ── PRODUCT COLUMNS ── */
(function initProdCols() {
  var col1 = document.getElementById('prodCol1');
  var col2 = document.getElementById('prodCol2');
  if (!col1 || !col2) return;

  function buildCards(el, products) {
    products.forEach(function(p, i) {
      var card = document.createElement('div');
      card.className = 'pcc';
      var src = p.imgs[0].replace(/ /g, '%20');
      card.innerHTML =
        '<div class="pcc-img"><img src="' + src + '" alt="' + p.short + '" ' + (i === 0 ? 'loading="eager" fetchpriority="high"' : 'loading="lazy"') + ' decoding="async" width="400" height="520"></div>' +
        '<div class="pcc-info">' +
          '<p class="pcc-name">' + p.short + '</p>' +
        '</div>';
      card.addEventListener('click', function() { openModal(p); });
      el.appendChild(card);
    });
  }

  // Split products between columns
  var half = Math.ceil(PRODUCTS.length / 2);
  var list1 = PRODUCTS.slice(0, half);
  var list2 = PRODUCTS.slice(half);

  // Build one set first to measure, then fill to cover container
  buildCards(col1, list1);
  buildCards(col2, list2);

  requestAnimationFrame(function() {
    var oneH1 = col1.scrollHeight;
    var oneH2 = col2.scrollHeight;
    var containerH = col1.parentElement.offsetHeight;

    // Keep adding copies until content is at least 3x the container height
    while (col1.scrollHeight < containerH * 3) buildCards(col1, list1);
    while (col2.scrollHeight < containerH * 3) buildCards(col2, list2);

    var h1 = oneH1; // one list cycle = one copy height
    var h2 = oneH2;

    // Col 1: scroll up
    gsap.to(col1, {
      y: -h1,
      duration: h1 / 16,
      ease: 'none',
      repeat: -1,
      onRepeat: function() { gsap.set(col1, { y: 0 }); }
    });

    // Col 2: scroll down (offset start so they feel different)
    gsap.set(col2, { y: -h2 });
    gsap.to(col2, {
      y: 0,
      duration: h2 / 16,
      ease: 'none',
      repeat: -1,
      onRepeat: function() { gsap.set(col2, { y: -h2 }); }
    });
  });
})();

  let activeImg = 0;

  function setImage(idx, imgs) {
    if (idx === activeImg || slicing) return;
    slicing = true;

    /* update thumbnails immediately */
    pmThumbs.querySelectorAll('.pm-thumb').forEach((t, i) => t.classList.toggle('is-active', i === idx));

    const N   = 30;
    const src = imgs[idx].replace(/ /g, '%20');

    /* overlay that holds the strips */
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;z-index:5;pointer-events:none;';

    const strips = [];
    for (let s = 0; s < N; s++) {
      const stripTop = (s / N * 100).toFixed(4);
      const stripH   = (100 / N).toFixed(4);

      /* strip container — clips to its horizontal band */
      const strip = document.createElement('div');
      strip.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${stripTop}%;`,
        `height:${stripH}%;`,
        'overflow:hidden;',
      ].join('');

      /* inner div — full image height, offset so correct portion is visible */
      const inner = document.createElement('div');
      inner.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${-(s * 100).toFixed(4)}%;`,
        `height:${N * 100}%;`,
        `background-image:url('${src}');`,
        'background-size:cover;',
        'background-position:center top;',
        'background-repeat:no-repeat;',
      ].join('');

      strip.appendChild(inner);
      overlay.appendChild(strip);
      strips.push(strip);
    }

    pmMain.appendChild(overlay);

    /* clip-path inset(100% 0 0 0) = fully clipped from top = truly invisible (no hairlines) */
    gsap.set(strips, { clipPath: 'inset(100% 0 0 0)' });

    const TOTAL_END  = 1.3;   /* all strips finish at this time — slow reveal per strip */
    const STAGGER_GAP = 0.008; /* small gap = fast bottom-to-top wave */
    const reversed   = [...strips].reverse(); /* reversed[0] = bottom strip */

  function closeModal() {
    const pmLeft  = modal.querySelector('.pm-left');
    const pmRight = modal.querySelector('.pm-right');
    gsap.killTweensOf([pmLeft, pmRight, pmBackdrop]);

    gsap.to(pmBackdrop, { opacity: 0, duration: 0.3, ease: 'power2.in' });
    modal.classList.remove('is-open');
    document.body.style.overflow = '';

    setTimeout(() => {
      gsap.set(pmLeft,     { clearProps: 'all' });
      gsap.set(pmRight,    { clearProps: 'all' });
      gsap.set(pmBackdrop, { opacity: 0 });
    }, 480);
  }

  pmClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal(); });
})();

/* ── SIDE NAV ──
   Always shows current page (big, active) + next page (smaller, dimmer).
   Clicking next slides both items up then navigates to next page.       */
(function initSideNav() {
  const PAGES = [
    { name: 'Jackets',  sub: 'Quilted',  url: 'jackets.html'  },
    { name: 'Vests',    sub: 'Knitted',  url: 'vests.html'    },
    { name: 'Blouses',  sub: 'Woven',    url: 'blouses.html'  },
    { name: 'Pants',    sub: 'Tailored', url: 'pants.html'    },
    { name: 'Shop All', sub: 'All',      url: 'shop-all.html' },
  ];

  /* detect current page index from URL */
  const filename = window.location.pathname.split('/').pop() || 'jackets.html';
  let currentIdx = PAGES.findIndex(p => p.url === filename);
  if (currentIdx < 0) currentIdx = 0;

  const nextIdx = (currentIdx + 1) % PAGES.length;
  const nav     = document.getElementById('sideNav');

  function render(cIdx, nIdx) {
    nav.innerHTML = '';

    /* active item */
    const active = document.createElement('div');
    active.className = 'side-nav-item is-active';
    active.innerHTML = `
      <span class="side-nav-name">${PAGES[cIdx].name}</span>
    `;
    nav.appendChild(active);

    /* next item */
    const next = document.createElement('div');
    next.className = 'side-nav-item is-next';
    next.innerHTML = `<span class="side-nav-name">${PAGES[nIdx].name}</span>`;
    nav.appendChild(next);

    /* entrance: both slide up from below */
    gsap.from([active, next], {
      y: 40, opacity: 0, duration: .9, ease: 'power3.out', stagger: .12
    });

    /* click: slide page content + nav up, then navigate */
    next.addEventListener('click', () => {
      sessionStorage.setItem('fromScroll', '1');
      gsap.to(['#pageHeader', '.grid-wrap', 'footer'], {
        y: -80, opacity: 0, duration: 0.5, ease: 'power2.in'
      });
      gsap.to([active, next], {
        y: -50, opacity: 0, duration: .45, ease: 'power2.in', stagger: .08,
        onComplete() {
          window.location.href = PAGES[nIdx].url;
        }
      });
    });
  }

  render(currentIdx, nextIdx);

  /* hide side-nav before it overlaps the footer */
  (function() {
    const footer = document.getElementById('site-footer');
    if (!footer || !nav) return;
    const io = new IntersectionObserver(function(entries) {
      const visible = entries[0].isIntersecting;
      gsap.to(nav, {
        opacity: visible ? 0 : 1,
        y:       visible ? 12 : 0,
        duration: 0.4,
        ease: 'power2.inOut',
        overwrite: 'auto'
      });
    }, { threshold: 0.04 });
    io.observe(footer);
  })();

})();

/* ── PAGE STARS ── */
(function() {
  var container = document.getElementById('page-stars');
  if (!container) return;
  var marks = ['×', '+', '◊', '·', '✶', '✦', '✧', '⋆', '★', '✵', '✴', '✸', '*', '⁎', '✺', '✻'];
  var anims  = ['yt-float', 'yt-twinkle', 'yt-drift'];
  for (var i = 0; i < 0; i++) {
    var dot  = document.createElement('span');
    var sz   = (Math.random() * 10 + 5).toFixed(0);
    var op   = (Math.random() * 0.18 + 0.04).toFixed(2);
    var dur  = (Math.random() * 3 + 0.8).toFixed(1);
    var del  = (Math.random() * 22).toFixed(1);
    var anim = anims[Math.floor(Math.random() * anims.length)];
    dot.textContent = marks[Math.floor(Math.random() * marks.length)];
    dot.style.cssText = [
      'position:absolute',
      'font-family:serif',
      'font-size:' + sz + 'px',
      'color:rgba(249,240,236,' + op + ')',
      'left:' + (Math.random() * 100).toFixed(1) + '%',
      'top:' + (Math.random() * 100).toFixed(1) + '%',
      'animation:' + anim + ' ' + dur + 's ease-in-out infinite alternate',
      'animation-delay:-' + del + 's',
      'pointer-events:none',
      'user-select:none',
      'will-change:transform'
    ].join(';');
    container.appendChild(dot);
  }
})();

<script>
/* ── HAMBURGER ── */
(function(){
  var ham  = document.getElementById('navHam');
  var menu = document.getElementById('mobMenu');
  if (!ham || !menu) return;
  var nav = document.getElementById('nav');
  var closeTimer = null;
  var savedScrollY = 0;

  function closeMenu() {
    menu.classList.add('is-closing');
    ham.classList.remove('is-open');
    ham.setAttribute('aria-label', 'Open menu');
    closeTimer = setTimeout(function(){
      closeTimer = null;
      menu.style.transition = 'none';
      menu.classList.remove('is-open');
      menu.classList.remove('is-closing');
      menu.offsetHeight;
      menu.style.transition = '';
      document.body.style.overflow = '';
      document.body.style.position = '';
      document.body.style.top = '';
      document.body.style.width = '';
      window.scrollTo(0, savedScrollY);
    }, 480);
  }

  function openMenu() {
    if (closeTimer) { clearTimeout(closeTimer); closeTimer = null; }
    var etsyWrap = menu.querySelector('.mob-etsy-logo-wrap');
    menu.style.transition = 'none';
    if (etsyWrap) { etsyWrap.style.transition = 'none'; etsyWrap.style.opacity = '0'; }
    menu.classList.remove('is-closing');
    menu.classList.remove('is-open');
    menu.offsetHeight;
    menu.style.transition = '';
    if (etsyWrap) { etsyWrap.style.transition = ''; etsyWrap.style.opacity = ''; }
    menu.classList.add('is-open');
    ham.classList.add('is-open');
    ham.setAttribute('aria-label', 'Close menu');
    savedScrollY = window.scrollY;
    document.body.style.overflow = 'hidden';
    document.body.style.position = 'fixed';
    document.body.style.top = '-' + savedScrollY + 'px';
    document.body.style.width = '100%';
  }

  ham.addEventListener('click', function(){
    if (menu.classList.contains('is-open') && !menu.classList.contains('is-closing')) {
      closeMenu();
    } else {
      openMenu();
    }
  });

  menu.querySelectorAll('.mob-link').forEach(function(link){
    link.addEventListener('click', function(){ closeMenu(); });
  });

  window.addEventListener('scroll', function(){
    if (nav) nav.classList.toggle('scrolled', window.pageYOffset > 10);
  }, { passive: true });
})();
</script>
