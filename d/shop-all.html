  <style>
    @import url("https://db.onlinewebfonts.com/c/5da49843f66caf14799662bd12aa55a2?family=Dream+Avenue");

    :root {
      --bg:         #121717;
      --bg-card:    #1a1f1f;
      --green:      #254441;
      --white:      #ffffff;
      --dim:        rgba(255,255,255,.42);
      --dimmer:     rgba(255,255,255,.22);

      --font-sans:  "Inter", system-ui, sans-serif;
      --gap:        59px;

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { background: var(--bg); overflow-x: hidden; scroll-behavior: auto; }

    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font-sans);
      overflow-x: hidden;
      min-height: 100vh;

    a { color: inherit; text-decoration: none; }

    /* ── NAV ── */
    #nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 300;
      height: 5rem;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 2.5rem;
      background: rgba(18,23,23,.88);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,255,255,.055);

    .nav-logo { display: flex; align-items: center; }
    .nav-logo img { height: 42px; width: auto; mix-blend-mode: lighten; }
    .nav-links { display: flex; gap: 2rem; list-style: none; }
    .nav-link {

      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(255,255,255,.38);
      transition: color .2s;

    .nav-link:hover,
    .nav-link.active { color: var(--white); }
    .nav-shop {
      font-size: .6875rem; font-weight: 300;
      letter-spacing: .12em; text-transform: uppercase;
      color: var(--white);

    .nav-shop:hover { background: var(--white); color: var(--bg); border-color: var(--white); }
    .nav-shop:focus-visible { outline: 1px solid rgba(255,255,255,.5); outline-offset: 3px; }

    /* ── PAGE HEADER ── */
    .page-header {

    .page-heading-wrap {

    .page-heading-clip {

    .page-heading {

    /* ── GRID ── */

    .grid-col {

    /* ── PRODUCT CARD ── */
    .card-product {

      cursor: pointer;
      display: block;

      object-position: center top;
      display: block;
      transform: scale(1.0);
      transition: transform 1.1s cubic-bezier(.25,.46,.45,.94);
      will-change: transform;

      inset: 0;

        rgba(18,23,23,.32) 50%,

      z-index: 1;

    .card-product:hover .card-info {

      font-weight: 600;
      font-size: .72rem;

      color: rgba(255,255,255,.88);

    .card-sub {
      font-family: var(--font-sans);
      font-size: .6rem; font-weight: 600;
      letter-spacing: .15em; text-transform: uppercase;
      color: rgba(255,255,255,.38);

    .card-cta { margin-top: .6rem; display: flex; gap: .6rem; flex-wrap: wrap; align-items: center; }
    .card-btn {

    .card-btn:active { opacity: .7; }

    .card-btn--buy:hover { background: #fff; border-color: transparent; opacity: 1; transform: scale(1.07); box-shadow: 0 6px 22px rgba(255,255,255,.3); }

    .card-reveal {

    /* ── BESTSELLER BADGE ── */

    /* ── LEFT SIDE NAV ── */
    .side-nav {
      position: fixed;

    .side-nav-item { display: flex; flex-direction: column; gap: .3rem; cursor: default; }
    .side-nav-item.is-prev { cursor: default; }
    .side-nav-item.is-prev .side-nav-name { color: rgba(255,255,255,.28); }
    .side-nav-item.is-next { cursor: pointer; }

    .side-nav-name {
      font-family: var(--font-sans);
      font-weight: 600;

      text-transform: uppercase;

    .side-nav-item.is-next:hover .side-nav-name { color: rgba(255,255,255,.55); }

    .side-nav-sub {

    /* ── FOOTER ── */
    .page-footer {

      color: rgba(255,255,255,.2);

    /* ── BACKDROP ── */
    .pm-backdrop {
      position: fixed;
      inset: 0;
      z-index: 0;
      background: rgba(0,0,0,.65);
      opacity: 0;
      pointer-events: none;
    }

    /* ── PRODUCT MODAL ── */
    .prod-modal {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: transparent;
      display: grid;
      grid-template-columns: 1.35fr 1fr;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .45s ease, visibility .45s ease;
    }
    .prod-modal.is-open {
      opacity: 1;
      visibility: visible;
      pointer-events: all;
    }

    .pm-left {
      position: relative;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      z-index: 1;
    }
    .pm-main {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
    }
    .pm-main-img {
      position: absolute;
      inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center top;
      display: block;
      opacity: 0;
      transition: opacity .55s ease;
    }
    .pm-main-img.is-active { opacity: 1; }

    .pm-thumbs {
      position: absolute;
      bottom: 2rem; left: 2rem;
      z-index: 10;
      display: flex;
      gap: .5rem;
      flex-wrap: wrap;
      max-width: calc(100% - 4rem);
    }
    .pm-thumb {
      width: 5.5rem; height: 5.5rem;
      object-fit: cover;
      object-position: center top;
      cursor: pointer;
      opacity: .5;
      border: 2px solid transparent;
      transition: opacity .25s ease, border-color .25s ease;
      flex-shrink: 0;
    }
    .pm-thumb.is-active { opacity: 1; border-color: rgba(255,255,255,.7); }
    .pm-thumb:hover { opacity: .85; }

    .pm-right {
      position: relative;
      height: 100vh;
      z-index: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1.5rem 3rem 4rem;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(255,255,255,.06);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,.12) transparent;
    }

    .pm-close {
      position: absolute;
      top: 1.5rem; right: 1.5rem;
      width: 2rem; height: 2rem;
      border: 1px solid transparent;
      background: transparent;
      color: rgba(255,255,255,.45);
      font-size: .85rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: border-color .22s ease, color .22s ease;
      border-radius: 50%;
    }
    .pm-close:hover { border-color: rgba(255,255,255,.55); color: var(--white); }

    .pm-brand { margin-bottom: 1rem; }
    .pm-brand img { height: 60px; width: auto; mix-blend-mode: lighten; opacity: .75; }

    .pm-title {
      font-family: var(--font-sans);
      font-style: normal;
      font-weight: 600;
      font-size: clamp(1.2rem, 2vw, 1.8rem);
      line-height: 1.2;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: rgba(255,255,255,.95);
      margin: 0 0 0.75rem;
    }

    .pm-divider {
      border: none;
      border-top: 2px solid rgba(255,255,255,0.7);
      margin: 0.75rem 0 1.8rem;
      width: 100%;
      flex-shrink: 0;
    }

    .pm-desc {
      font-family: var(--font-sans);
      font-size: .8125rem;
      font-weight: 300;
      line-height: 1.75;
      color: rgba(255,255,255,.6);
      margin: 0 0 2.5rem;
      max-width: 44ch;
    }

    .pm-btn {
      display: inline-block;
      align-self: flex-start;
      font-family: var(--font-sans);
      font-size: .6rem;
      font-weight: 400;
      letter-spacing: .2em;
      text-transform: uppercase;
      color: var(--bg);
      background: var(--white);
      text-decoration: none;
      border: 1px solid var(--white);
      padding: .85rem 2.2rem;
      border-radius: 999px;
      transition: background .25s ease, color .25s ease;
      margin-bottom: 3.5rem;
    }
    .pm-btn:hover { background: transparent; color: var(--white); }
    .pm-btn:focus-visible { outline: 1px solid rgba(255,255,255,.5); outline-offset: 3px; }

    .pm-stats {
      margin-top: auto;
      border-top: 1px solid rgba(255,255,255,.08);
      padding-top: 2rem;
    }
    .pm-stat-label {
      font-family: var(--font-sans);

    }
    .pm-stat-val {
      font-family: var(--font-serif);

    }
    .pm-stat-unit {

    }
    .pm-desc-block { margin-bottom: 1.1rem; }
    .pm-desc-label {
      font-family: var(--font-sans);

      line-height: 1.8; color: rgba(255,255,255,.62);
    }
    .pm-desc-list li::before { content: '· '; color: rgba(255,255,255,.3); }
    .pm-desc-note {

      font-size: .72rem; font-weight: 300;

      padding-top: .8rem;

    .pm-stat-sub {

    /* ── PAGE STARS ── */
    #page-stars {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
      contain: layout style paint;
    }
    @keyframes yt-float {
      0%   { transform: translateY(0)     scale(1);    opacity: .7; }
      50%  { transform: translateY(-22px) scale(1.08); opacity: 1;  }
      100% { transform: translateY(-5px)  scale(0.94); opacity: .5; }
    }
    @keyframes yt-twinkle {
      0%   { transform: translateY(0)     scale(0.85) rotate(0deg);  opacity: .08; }
      35%  { transform: translateY(-14px) scale(1.2)  rotate(15deg); opacity: .45; }
      65%  { transform: translateY(-8px)  scale(0.9)  rotate(-8deg); opacity: .18; }
      100% { transform: translateY(-20px) scale(1.05) rotate(22deg); opacity: .55; }
    }
    @keyframes yt-drift {
      0%   { transform: translate(0,0)        scale(1)    rotate(0deg);  opacity: .12; }
      40%  { transform: translate(8px,-18px)  scale(1.15) rotate(12deg); opacity: .38; }
      80%  { transform: translate(-6px,-10px) scale(0.88) rotate(-5deg); opacity: .2;  }
      100% { transform: translate(4px,-24px)  scale(1.1)  rotate(18deg); opacity: .42; }
    }

      .nav-link     { font-size: 0.85rem; }

      .prod-modal { grid-template-columns: 1.2fr 1fr; }

const colLeft  = document.getElementById('colLeft');
const colMid   = document.getElementById('colMid');
const colRight = document.getElementById('colRight');
const cols     = [colLeft, colMid, colRight];

function makeCard(p, i) {
  const wrap = document.createElement('div');
  wrap.className = 'card-reveal';

  const card = document.createElement('div');
  card.className = 'card-product';
  card.style.cursor = 'pointer';

  const src = (p.imgs[0]).replace(/ /g, '%20');
  card.innerHTML = `
    <img class="card-img" src="${src}" alt="${p.short}" loading="eager">
    <div class="card-scrim"></div>
    <div class="card-info">
      <div class="card-name">${p.short}</div>
      <div class="card-sub">View pattern</div>
      <div class="card-cta">
        <span class="card-btn">Open →</span>
        <a class="card-btn card-btn--buy" href="${p.url}" target="_blank" rel="noopener">Buy Now</a>
      </div>
    </div>
  `;

  card.querySelector('.card-btn--buy').addEventListener('click', e => e.stopPropagation());
  card.querySelector('.card-btn:not(.card-btn--buy)').addEventListener('click', function(e){ e.stopPropagation(); if(p.slug) window.location.href='products/'+p.slug+'.html'; });
  card.addEventListener('click', () => openModal(p));
  wrap.appendChild(card);
  return wrap;
}

PRODUCTS.forEach((p, i) => {
  cols[i % 3].appendChild(makeCard(p, i));
});

/* Fill last row so it always ends with 3 visible cards */
if (PRODUCTS.length >= 3) {
  const maxLen = Math.max(...cols.map(c => c.children.length));
  cols.forEach(col => {
    while (col.children.length < maxLen) {
      const clone = col.lastElementChild.cloneNode(true);
      col.appendChild(clone);
    }
  });
}

/* ── PAGE ENTRANCE: slides in from below only when arriving via scroll/nav ── */
if (sessionStorage.getItem('fromScroll')) {
  sessionStorage.removeItem('fromScroll');
  gsap.from(['.page-heading-wrap', '.grid-wrap'], {
    y: 80, duration: 0.85, ease: 'power3.out', stagger: 0.06, force3D: true
  });
}

gsap.set('#pageHeading', { yPercent: 105 });
gsap.to('#pageHeading', { yPercent: 0, duration: 1.15, ease: 'power3.out', delay: .1 });

gsap.to('#pageHeading', {
  yPercent: -25,
  ease: 'none',
  scrollTrigger: {
    trigger: '#pageHeader',
    start: 'top top',
    end: 'bottom top',
    scrub: true,
  }
});

gsap.timeline({
  scrollTrigger: {
    trigger: document.documentElement,
    start: 'top top',
    end: 'bottom bottom',
    scrub: 1.5,
  }
})
.to(['#colLeft', '#colRight'], { y: -600, ease: 'none' })
.to(['#colLeft', '#colRight'], { y: 0,    ease: 'none' });

/* ── PRODUCT MODAL ── */
(function initModal() {
  const modal      = document.getElementById('prodModal');
  const pmMain     = document.getElementById('pmMain');
  const pmThumbs   = document.getElementById('pmThumbs');
  const pmTitle    = document.getElementById('pmTitle');
  const pmDesc     = document.getElementById('pmDesc');
  const pmBtn      = document.getElementById('pmBtn');
  const pmClose    = document.getElementById('pmClose');
  const pmBackdrop = document.getElementById('pmBackdrop');

  let activeImg = 0;
  let slicing   = false;

  function setImage(idx, imgs) {
    if (idx === activeImg || slicing) return;
    slicing = true;

    pmThumbs.querySelectorAll('.pm-thumb').forEach((t, i) => t.classList.toggle('is-active', i === idx));

    const N   = 30;
    const src = imgs[idx].replace(/ /g, '%20');

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;z-index:5;pointer-events:none;';

    const strips = [];
    for (let s = 0; s < N; s++) {
      const stripTop = (s / N * 100).toFixed(4);
      const stripH   = (100 / N).toFixed(4);

      const strip = document.createElement('div');
      strip.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${stripTop}%;`,
        `height:${stripH}%;`,
        'overflow:hidden;',
      ].join('');

      const inner = document.createElement('div');
      inner.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${-(s * 100).toFixed(4)}%;`,
        `height:${N * 100}%;`,
        `background-image:url('${src}');`,
        'background-size:cover;',
        'background-position:center top;',
        'background-repeat:no-repeat;',
      ].join('');

      strip.appendChild(inner);
      overlay.appendChild(strip);
      strips.push(strip);
    }

    pmMain.appendChild(overlay);

    gsap.set(strips, { clipPath: 'inset(100% 0 0 0)' });

    const TOTAL_END   = 1.3;
    const STAGGER_GAP = 0.008;
    const reversed    = [...strips].reverse();

    const tl = gsap.timeline({
      onComplete() {
        const allImgs = pmMain.querySelectorAll('.pm-main-img');
        allImgs.forEach(el => { el.style.transition = 'none'; });
        allImgs.forEach((el, i) => el.classList.toggle('is-active', i === idx));
        requestAnimationFrame(() => {
          overlay.remove();
          allImgs.forEach(el => { el.style.transition = ''; });
          activeImg = idx;
          slicing   = false;
        });
      }
    });

    reversed.forEach((strip, i) => {
      const startAt  = i * STAGGER_GAP;
      const duration = TOTAL_END - startAt;
      tl.to(strip, { clipPath: 'inset(0% 0 0 0)', duration, ease: 'power2.out' }, startAt);
    });
  }

  window.openModal = function(p) {
    pmTitle.textContent = p.short;
    pmDesc.innerHTML    = p.desc;
    pmBtn.href          = p.url;

    pmMain.innerHTML = '';
    p.imgs.forEach((src, i) => {
      const img = document.createElement('img');
      img.className = 'pm-main-img' + (i === 0 ? ' is-active' : '');
      img.src = src.replace(/ /g, '%20');
      img.alt = p.short;
      pmMain.appendChild(img);
    });

    pmThumbs.innerHTML = '';
    p.imgs.forEach((src, i) => {
      const thumb = document.createElement('img');
      thumb.className = 'pm-thumb' + (i === 0 ? ' is-active' : '');
      thumb.src = src.replace(/ /g, '%20');
      thumb.alt = p.short;
      thumb.addEventListener('click', () => setImage(i, p.imgs));
      pmThumbs.appendChild(thumb);
    });

    activeImg = 0;

    modal.classList.add('is-open');
    document.body.style.overflow = 'hidden';

    const pmLeft  = modal.querySelector('.pm-left');
    const pmRight = modal.querySelector('.pm-right');
    gsap.killTweensOf([pmLeft, pmRight]);

    gsap.fromTo(pmBackdrop, { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'power2.out' });

    const firstImg = pmMain.querySelector('.pm-main-img.is-active');
    const startReveal = () => {
      gsap.fromTo(pmLeft,  { clipPath: 'inset(0 100% 0 0)' }, { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power3.out' });
      gsap.fromTo(pmRight, { clipPath: 'inset(0 100% 0 0)' }, { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power3.out', delay: 0.85 });
    };
    if (firstImg && !firstImg.complete) {
      firstImg.decode().then(startReveal).catch(startReveal);
    } else {
      startReveal();
    }

    pmTitle.innerHTML = [...p.short].map(ch =>
      `<span style="display:inline-block;overflow:hidden;vertical-align:bottom;line-height:1.3"><span style="display:inline-block;will-change:transform">${ch === ' ' ? '&nbsp;' : ch}</span></span>`
    ).join('');
    const titleChars = pmTitle.querySelectorAll('span > span');

    gsap.set(titleChars,                                    { yPercent: 110 });
    gsap.set([pmDesc, pmBtn],                               { opacity: 0, y: 20 });
    gsap.set(pmRight.querySelector('.pm-brand img'),        { opacity: 0, y: 12 });
    gsap.set(pmRight.querySelector('.pm-divider'),          { opacity: 0 });

    gsap.timeline({ defaults: { ease: 'power3.out' } })
      .to(pmRight.querySelector('.pm-brand img'), { opacity: 1, y: 0, duration: .6 },             1.0)
      .to(titleChars,                             { yPercent: 0, duration: 1.0, stagger: 0.028 }, 1.25)
      .to(pmRight.querySelector('.pm-divider'),   { opacity: 1, duration: .4 },                   1.6)
      .to(pmDesc,                                 { opacity: 1, y: 0, duration: .9 },             1.7)
      .to(pmBtn,                                  { opacity: 1, y: 0, duration: .6 },             2.0);
  };

  function closeModal() {
    const pmLeft  = modal.querySelector('.pm-left');
    const pmRight = modal.querySelector('.pm-right');
    gsap.killTweensOf([pmLeft, pmRight]);
    modal.style.transition = 'none';

    const tl = gsap.timeline({
      onComplete() {
        modal.style.opacity      = '0';
        modal.style.visibility   = 'hidden';
        modal.style.transition   = 'none';
        modal.classList.remove('is-open');
        modal.style.overflow     = '';
        document.body.style.overflow = '';
        requestAnimationFrame(() => {
          gsap.set(pmLeft,     { clearProps: 'all' });
          gsap.set(pmRight,    { clearProps: 'all' });
          gsap.set(pmBackdrop, { opacity: 0 });
          modal.style.opacity    = '';
          modal.style.visibility = '';
          modal.style.transition = '';
        });
      }
    });

    modal.style.overflow = 'hidden';
    tl.to(pmBackdrop, { opacity: 0, duration: 0.5, ease: 'power2.in' }, 0.4);
    tl.to(pmLeft,  { x: pmLeft.offsetWidth, duration: 0.5, ease: 'power2.inOut' }, 0);
    tl.set(pmLeft, { visibility: 'hidden' }, 0.45);
    tl.to(pmRight, { x: window.innerWidth, duration: 0.9, ease: 'power3.in' }, 0.45);
  }

  pmClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal(); });
})();

/* ── SIDE NAV ── */
(function initSideNav() {
  const PAGES = [
    { name: 'Jackets',  sub: 'Quilted',  url: 'jackets.html'  },
    { name: 'Vests',    sub: 'Knitted',  url: 'vests.html'    },
    { name: 'Blouses',  sub: 'Woven',    url: 'blouses.html'  },
    { name: 'Pants',    sub: 'Tailored', url: 'pants.html'    },
    { name: 'Shop All', sub: 'All',      url: 'shop-all.html' },
  ];

  const filename  = window.location.pathname.split('/').pop() || 'shop-all.html';
  let currentIdx  = PAGES.findIndex(p => p.url === filename);
  if (currentIdx < 0) currentIdx = 4;

  const nextIdx = (currentIdx + 1) % PAGES.length;
  const nav     = document.getElementById('sideNav');

  function render(cIdx, nIdx) {
    const prevIdx = cIdx - 1;
    nav.innerHTML = '';

    if (prevIdx >= 0) {
      const prev = document.createElement('div');
      prev.className = 'side-nav-item is-prev';
      prev.style.cursor = 'pointer';
      prev.innerHTML = `<span class="side-nav-name">${PAGES[prevIdx].name}</span>`;
      prev.addEventListener('click', () => {
        sessionStorage.setItem('fromScroll', '1');
        gsap.to(['#pageHeader', '.grid-wrap', 'footer'], { y: -80, opacity: 0, duration: 0.5, ease: 'power2.in' });
        gsap.to(nav.children, { y: -50, opacity: 0, duration: .45, ease: 'power2.in', stagger: .08,
          onComplete() { window.location.href = PAGES[prevIdx].url; }
        });
      });
      nav.appendChild(prev);
    }

    const active = document.createElement('div');
    active.className = 'side-nav-item is-active';
    active.innerHTML = `<span class="side-nav-name">${PAGES[cIdx].name}</span>`;
    nav.appendChild(active);

    const next = document.createElement('div');
    next.className = 'side-nav-item is-next';
    next.innerHTML = `<span class="side-nav-name">${PAGES[nIdx].name}</span>`;
    nav.appendChild(next);

    gsap.from([active, next], {
      y: 40, opacity: 0, duration: .9, ease: 'power3.out', stagger: .12
    });

    next.addEventListener('click', () => {
      sessionStorage.setItem('fromScroll', '1');
      gsap.to(['#pageHeader', '.grid-wrap', 'footer'], {
        y: -80, opacity: 0, duration: 0.5, ease: 'power2.in'
      });
      gsap.to([active, next], {
        y: -50, opacity: 0, duration: .45, ease: 'power2.in', stagger: .08,
        onComplete() { window.location.href = PAGES[nIdx].url; }
      });
    });
  }

  render(currentIdx, nextIdx);

  /* hide side-nav before it overlaps the footer */
  (function() {
    const footer = document.getElementById('site-footer');
    if (!footer || !nav) return;
    const io = new IntersectionObserver(function(entries) {
      const visible = entries[0].isIntersecting;
      gsap.to(nav, {
        opacity: visible ? 0 : 1,
        y:       visible ? 12 : 0,
        duration: 0.4,
        ease: 'power2.inOut',
        overwrite: 'auto'
      });
    }, { threshold: 0.04 });
    io.observe(footer);
  })();

})();

(function() {
  var container = document.getElementById('page-stars');
  if (!container) return;
  var marks = ['×', '+', '◊', '·', '✶', '✦', '✧', '⋆', '★', '✵', '✴', '✸', '*', '⁎', '✺', '✻'];
  var anims  = ['yt-float', 'yt-twinkle', 'yt-drift'];

    var dot  = document.createElement('span');
    var sz   = (Math.random() * 10 + 5).toFixed(0);
    var op   = (Math.random() * 0.18 + 0.04).toFixed(2);
    var dur  = (Math.random() * 3 + 0.8).toFixed(1);
    var del  = (Math.random() * 22).toFixed(1);
    var anim = anims[Math.floor(Math.random() * anims.length)];
    dot.textContent = marks[Math.floor(Math.random() * marks.length)];

      'position:absolute',
      'font-family:serif',
      'font-size:' + sz + 'px',
      'color:rgba(249,240,236,' + op + ')',
      'left:' + (Math.random() * 100).toFixed(1) + '%',
      'top:' + (Math.random() * 100).toFixed(1) + '%',
      'animation:' + anim + ' ' + dur + 's ease-in-out infinite alternate',
      'animation-delay:-' + del + 's',
      'pointer-events:none',
      'user-select:none',
      'will-change:transform'
    ].join(';');
    container.appendChild(dot);
  }
})();
