  <style>
    @import url("https://db.onlinewebfonts.com/c/5da49843f66caf14799662bd12aa55a2?family=Dream+Avenue");

    :root {
      --bg:         #121717;
      --bg-card:    #1a1f1f;
      --green:      #254441;
      --white:      #ffffff;
      --dim:        rgba(255,255,255,.42);

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      background: var(--bg);
      overflow-x: hidden; scroll-behavior: auto;

    body {

    /* ── PAGE HEADER ── */

/* ── BUILD CARDS ──
   Distribute into 3 columns: left(0,3,6,9) mid(1,4,7) right(2,5,8)
   Middle column is offset 220px down via CSS — so left/right appear first on scroll */

const colLeft  = document.getElementById('colLeft');
const colMid   = document.getElementById('colMid');
const colRight = document.getElementById('colRight');
const cols     = [colLeft, colMid, colRight];

function makeCard(p, i) {
  const wrap = document.createElement('div');
  wrap.className = 'card-reveal';

  const card = document.createElement('div');
  card.className = 'card-product';
  card.style.cursor = 'pointer';

  const src = (p.imgs[0]).replace(/ /g, '%20');
  card.innerHTML = `
    <img class="card-img" src="${src}" alt="${p.short}" loading="eager">
    <div class="card-scrim"></div>
    <div class="card-info">
      <div class="card-name">${p.short}</div>
      <div class="card-sub">View pattern</div>
      <div class="card-cta">
        <span class="card-btn">Open →</span>
        <a class="card-btn card-btn--buy" href="${p.url}" target="_blank" rel="noopener">Buy Now</a>
      </div>
    </div>
  `;

  card.querySelector('.card-btn--buy').addEventListener('click', e => e.stopPropagation());
  card.addEventListener('click', () => openModal(p));
  wrap.appendChild(card);
  return wrap;
}

PRODUCTS.forEach((p, i) => {
  cols[i % 3].appendChild(makeCard(p, i));
});

/* Fill last row so it always ends with 3 visible cards */
if (PRODUCTS.length >= 3) {
  const maxLen = Math.max(...cols.map(c => c.children.length));
  cols.forEach(col => {
    while (col.children.length < maxLen) {
      const clone = col.lastElementChild.cloneNode(true);
      col.appendChild(clone);
    }
  });
}


/* ── PAGE ENTRANCE: slides in from below only when arriving via scroll/nav ── */
if (sessionStorage.getItem('fromScroll')) {
  sessionStorage.removeItem('fromScroll');

    y: 80, duration: 0.85, ease: 'power3.out', stagger: 0.06, force3D: true

/* ── ENTRANCE: heading slides up from clip ── */

gsap.to('#pageHeading', { yPercent: 0, duration: 1.15, ease: 'power3.out', delay: .1 });

/* ── HEADING PARALLAX on scroll ── */

/* ── COLUMN PARALLAX ──

   scroll-end, so no gap is created between the last card and the footer. */

/* ── PRODUCT MODAL ── */
(function initModal() {
  const modal      = document.getElementById('prodModal');
  const pmMain     = document.getElementById('pmMain');
  const pmThumbs   = document.getElementById('pmThumbs');
  const pmTitle    = document.getElementById('pmTitle');
  const pmDesc     = document.getElementById('pmDesc');
  const pmBtn      = document.getElementById('pmBtn');
  const pmClose    = document.getElementById('pmClose');
  const pmBackdrop = document.getElementById('pmBackdrop');

  let activeImg = 0;
  let slicing    = false;

  function setImage(idx, imgs) {
    if (idx === activeImg || slicing) return;
    slicing = true;

    /* update thumbnails immediately */
    pmThumbs.querySelectorAll('.pm-thumb').forEach((t, i) => t.classList.toggle('is-active', i === idx));

    const N   = 30;
    const src = imgs[idx].replace(/ /g, '%20');

    /* overlay that holds the strips */
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;z-index:5;pointer-events:none;';

    const strips = [];
    for (let s = 0; s < N; s++) {
      const stripTop = (s / N * 100).toFixed(4);
      const stripH   = (100 / N).toFixed(4);

      /* strip container — clips to its horizontal band */
      const strip = document.createElement('div');
      strip.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${stripTop}%;`,
        `height:${stripH}%;`,
        'overflow:hidden;',
      ].join('');

      /* inner div — full image height, offset so correct portion is visible */
      const inner = document.createElement('div');
      inner.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${-(s * 100).toFixed(4)}%;`,
        `height:${N * 100}%;`,
        `background-image:url('${src}');`,
        'background-size:cover;',
        'background-position:center top;',
        'background-repeat:no-repeat;',
      ].join('');

      strip.appendChild(inner);
      overlay.appendChild(strip);
      strips.push(strip);
    }

    pmMain.appendChild(overlay);

    /* clip-path inset(100% 0 0 0) = fully clipped from top = truly invisible (no hairlines) */
    gsap.set(strips, { clipPath: 'inset(100% 0 0 0)' });

    /* staggered start bottom-to-top, but all strips end at the same time */
    const TOTAL_END  = 1.3;   /* all strips finish at this time — slow reveal per strip */
    const STAGGER_GAP = 0.008; /* small gap = fast bottom-to-top wave */
    const reversed   = [...strips].reverse(); /* reversed[0] = bottom strip */

    const tl = gsap.timeline({
      onComplete() {
        const allImgs = pmMain.querySelectorAll('.pm-main-img');
        allImgs.forEach(el => { el.style.transition = 'none'; });
        allImgs.forEach((el, i) => el.classList.toggle('is-active', i === idx));
        requestAnimationFrame(() => {
          overlay.remove();
          allImgs.forEach(el => { el.style.transition = ''; });
          activeImg = idx;
          slicing   = false;
        });
      }
    });

    reversed.forEach((strip, i) => {
      const startAt  = i * STAGGER_GAP;
      const duration = TOTAL_END - startAt; /* bottom strip longest, top strip shortest */
      tl.to(strip, {
        clipPath: 'inset(0% 0 0 0)',
        duration,
        ease: 'power2.out',
      }, startAt);
    });
  }

  window.openModal = function(p) {
    /* populate */
    pmTitle.textContent = p.short;
    pmDesc.innerHTML    = p.desc;
    pmBtn.href          = p.url;

    /* build main images */
    pmMain.innerHTML = '';
    p.imgs.forEach((src, i) => {
      const img = document.createElement('img');
      img.className = 'pm-main-img' + (i === 0 ? ' is-active' : '');
      img.src = src.replace(/ /g, '%20');
      img.alt = p.short;
      pmMain.appendChild(img);
    });

    /* build thumbnails */
    pmThumbs.innerHTML = '';
    p.imgs.forEach((src, i) => {
      const thumb = document.createElement('img');
      thumb.className = 'pm-thumb' + (i === 0 ? ' is-active' : '');
      thumb.src = src.replace(/ /g, '%20');
      thumb.alt = p.short;
      thumb.addEventListener('click', () => setImage(i, p.imgs));
      pmThumbs.appendChild(thumb);
    });

    activeImg = 0;

    /* open */
    modal.classList.add('is-open');
    document.body.style.overflow = 'hidden';

    /* ── ENTRANCE ANIMATION ── */
    const pmLeft  = modal.querySelector('.pm-left');
    const pmRight = modal.querySelector('.pm-right');
    gsap.killTweensOf([pmLeft, pmRight]);

    gsap.fromTo(pmBackdrop, { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'power2.out' });

    const firstImg = pmMain.querySelector('.pm-main-img.is-active');
    const startReveal = () => {
      gsap.fromTo(pmLeft,
        { clipPath: 'inset(0 100% 0 0)' },
        { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power3.out' }
      );
      gsap.fromTo(pmRight,
        { clipPath: 'inset(0 100% 0 0)' },
        { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power3.out', delay: 0.85 }
      );
    };
    if (firstImg && !firstImg.complete) {
      firstImg.decode().then(startReveal).catch(startReveal);
    } else {
      startReveal();
    }

    /* 3. Split title into clipped characters */
    pmTitle.innerHTML = [...p.short].map(ch =>
      `<span style="display:inline-block;overflow:hidden;vertical-align:bottom;line-height:1.3"><span style="display:inline-block;will-change:transform">${ch === ' ' ? '&nbsp;' : ch}</span></span>`
    ).join('');
    const titleChars = pmTitle.querySelectorAll('span > span');

    /* 4. Set initial hidden states */
    gsap.set(titleChars,                                    { yPercent: 110 });
    gsap.set([pmDesc, pmBtn],                               { opacity: 0, y: 20 });
    gsap.set(pmRight.querySelector('.pm-brand img'),        { opacity: 0, y: 12 });
    gsap.set(pmRight.querySelector('.pm-divider'),          { opacity: 0 });

    /* 5. Text elements animate in as panel arrives (panel completes at ~1.6s) */
    gsap.timeline({ defaults: { ease: 'power3.out' } })
      .to(pmRight.querySelector('.pm-brand img'), { opacity: 1, y: 0, duration: .6 },             1.0)
      .to(titleChars,                             { yPercent: 0, duration: 1.0, stagger: 0.028 }, 1.25)
      .to(pmRight.querySelector('.pm-divider'),   { opacity: 1, duration: .4 },                   1.6)
      .to(pmDesc,                                 { opacity: 1, y: 0, duration: .9 },             1.7)
      .to(pmBtn,                                  { opacity: 1, y: 0, duration: .6 },             2.0);
  };

  function closeModal() {
    const pmLeft  = modal.querySelector('.pm-left');
    const pmRight = modal.querySelector('.pm-right');
    /* kill any in-progress tweens */
    gsap.killTweensOf([pmLeft, pmRight]);
    modal.style.transition = 'none';

    const tl = gsap.timeline({
      onComplete() {
        modal.style.opacity      = '0';
        modal.style.visibility   = 'hidden';
        modal.style.transition   = 'none';
        modal.classList.remove('is-open');
        modal.style.overflow     = '';
        document.body.style.overflow = '';
        requestAnimationFrame(() => {
          gsap.set(pmLeft,     { clearProps: 'all' });
          gsap.set(pmRight,    { clearProps: 'all' });
          gsap.set(pmBackdrop, { opacity: 0 });
          modal.style.opacity    = '';
          modal.style.visibility = '';
          modal.style.transition = '';
        });
      }
    });

    modal.style.overflow = 'hidden';

    /* 0. Backdrop fades out */
    tl.to(pmBackdrop, { opacity: 0, duration: 0.5, ease: 'power2.in' }, 0.4);

    /* 1. Left image slides into text panel */
    tl.to(pmLeft, { x: pmLeft.offsetWidth, duration: 0.5, ease: 'power2.inOut' }, 0);

    /* 2. Instantly hide left once behind the right panel */
    tl.set(pmLeft, { visibility: 'hidden' }, 0.45);

    /* 3. Right panel exits to the right edge */
    tl.to(pmRight, { x: window.innerWidth, duration: 0.9, ease: 'power3.in' }, 0.45);
  }

  pmClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal(); });
})();

/* ── SIDE NAV ──
   Always shows current page (big, active) + next page (smaller, dimmer).
   Clicking next slides both items up then navigates to next page.       */
(function initSideNav() {
  const PAGES = [
    { name: 'Jackets',  sub: 'Quilted',  url: 'jackets.html'  },
    { name: 'Vests',    sub: 'Knitted',  url: 'vests.html'    },
    { name: 'Blouses',  sub: 'Woven',    url: 'blouses.html'  },
    { name: 'Pants',    sub: 'Tailored', url: 'pants.html'    },
    { name: 'Shop All', sub: 'All',      url: 'shop-all.html' },
  ];

  /* detect current page index from URL */
  const filename = window.location.pathname.split('/').pop() || 'jackets.html';
  let currentIdx = PAGES.findIndex(p => p.url === filename);
  if (currentIdx < 0) currentIdx = 0;

  const nextIdx = (currentIdx + 1) % PAGES.length;
  const nav     = document.getElementById('sideNav');

  function render(cIdx, nIdx) {
    nav.innerHTML = '';

    /* active item */
    const active = document.createElement('div');
    active.className = 'side-nav-item is-active';
    active.innerHTML = `
      <span class="side-nav-name">${PAGES[cIdx].name}</span>
    `;
    nav.appendChild(active);

    /* next item */
    const next = document.createElement('div');
    next.className = 'side-nav-item is-next';
    next.innerHTML = `<span class="side-nav-name">${PAGES[nIdx].name}</span>`;
    nav.appendChild(next);

    /* entrance: both slide up from below */
    gsap.from([active, next], {
      y: 40, opacity: 0, duration: .9, ease: 'power3.out', stagger: .12
    });

    /* click: slide page content + nav up, then navigate */
    next.addEventListener('click', () => {
      sessionStorage.setItem('fromScroll', '1');
      gsap.to(['#pageHeader', '.grid-wrap', 'footer'], {
        y: -80, opacity: 0, duration: 0.5, ease: 'power2.in'
      });
      gsap.to([active, next], {
        y: -50, opacity: 0, duration: .45, ease: 'power2.in', stagger: .08,
        onComplete() {
          window.location.href = PAGES[nIdx].url;
        }
      });
    });
  }

  render(currentIdx, nextIdx);

  /* hide side-nav before it overlaps the footer */
  (function() {
    const footer = document.getElementById('site-footer');
    if (!footer || !nav) return;
    const io = new IntersectionObserver(function(entries) {
      const visible = entries[0].isIntersecting;
      gsap.to(nav, {
        opacity: visible ? 0 : 1,
        y:       visible ? 12 : 0,
        duration: 0.4,
        ease: 'power2.inOut',
        overwrite: 'auto'
      });
    }, { threshold: 0.04 });
    io.observe(footer);
  })();

})();

(function() {
  var container = document.getElementById('page-stars');
  if (!container) return;
  var marks = ['×', '+', '◊', '·', '✶', '✦', '✧', '⋆', '★', '✵', '✴', '✸', '*', '⁎', '✺', '✻'];
  var anims  = ['yt-float', 'yt-twinkle', 'yt-drift'];
  for (var i = 0; i < 80; i++) {
    var dot  = document.createElement('span');
    var sz   = (Math.random() * 10 + 5).toFixed(0);
    var op   = (Math.random() * 0.18 + 0.04).toFixed(2);
    var dur  = (Math.random() * 3 + 0.8).toFixed(1);
    var del  = (Math.random() * 22).toFixed(1);
    var anim = anims[Math.floor(Math.random() * anims.length)];
    dot.textContent = marks[Math.floor(Math.random() * marks.length)];
    dot.style.cssText = [
      'position:absolute',
      'font-family:serif',
      'font-size:' + sz + 'px',
      'color:rgba(249,240,236,' + op + ')',
      'left:' + (Math.random() * 100).toFixed(1) + '%',
      'top:' + (Math.random() * 100).toFixed(1) + '%',
      'animation:' + anim + ' ' + dur + 's ease-in-out infinite alternate',
      'animation-delay:-' + del + 's',
      'pointer-events:none',
      'user-select:none',
      'will-change:transform'
    ].join(';');
    container.appendChild(dot);
  }
})();

</script>

  <div class="sf-lang-row">
    <div class="lang-picker">
      <button class="lang-btn" aria-label="Select language" id="langBtn">EN</button>
      <div class="lang-dropdown">
        <button class="lang-option" onclick="setLang('en')">&#127482;&#127480; English</button>
        <button class="lang-option" onclick="setLang('fr')">&#127467;&#127479; Fran&#231;ais</button>
        <button class="lang-option" onclick="setLang('de')">&#127465;&#127466; Deutsch</button>
      </div>
    </div>
  </div>
</footer>

  <script>
    function setLang(l) {
      var url = window.location.href;
      if (url.indexOf('.translate.goog') > -1) {
        var m = url.match(/[?&]u=([^&]+)/);
        if (m) url = decodeURIComponent(m[1]);
      }
      if (l === 'en') { window.location.href = url; return; }
      window.location.href = 'https://translate.google.com/translate?sl=en&tl=' + l + '&u=' + encodeURIComponent(url);
    }
    (function() {
      var b = document.getElementById('langBtn');
      if (!b) return;
      var h = window.location.href;
      if (h.indexOf('tl=fr') > -1 || h.indexOf('_x_tr_tl=fr') > -1) b.innerHTML = '&#127758; FR';
      else if (h.indexOf('tl=de') > -1 || h.indexOf('_x_tr_tl=de') > -1) b.innerHTML = '&#127758; DE';
    })();
  </script>
