<div class="prod-modal" id="prodModal" role="dialog" aria-modal="true">

        <path d="M8 8.8 L8.72 10.9 L11 10.9 L9.14 12.18 L9.86 14.28 L8 13 L6.14 14.28 L6.86 12.18 L5 10.9 L7.28 10.9 Z" fill="#F5C518"/>

  </div>
</div>


<script>
gsap.registerPlugin(ScrollTrigger);

const PRODUCTS = [
  {
    short: 'Nova Pants',
    slug: 'nova-pants'
    desc: `<div class="pm-desc-block"><div class="pm-desc-label">Sizes</div><div class="pm-desc-text">0–34 (24"–54" waist · 34"–65" hip)</div></div><div class="pm-desc-block"><div class="pm-desc-label">Pattern Formats</div><div class="pm-desc-text">A4, US Letter, A0 (print shop friendly)</div></div><div class="pm-desc-block"><div class="pm-desc-label">Design Features</div><ul class="pm-desc-list"><li>High-waisted wide-leg trousers</li><li>Elastic waistband</li><li>Full length with elegant drape</li><li>Optional cargo pockets</li><li>Optional drawstring</li></ul></div><div class="pm-desc-block"><div class="pm-desc-label">Included With Your Pattern</div><ul class="pm-desc-list"><li>Digital PDF sewing pattern — layered files (print only your size)</li><li>A4 &amp; US Letter print-at-home format</li><li>Large format A0/Copyshop file</li><li>Seam allowances included · cm &amp; in measurements</li><li>Step-by-step illustrated instruction booklet</li><li>Detailed YouTube tutorial video</li></ul></div><div class="pm-desc-block"><div class="pm-desc-label">Recommended Fabrics</div><div class="pm-desc-text">Wide variety of fabrics; cottons or linens between 3–9 oz per square yard are favorites.</div></div><div class="pm-desc-note">Quality Guarantee: Rigorously tested. Money Back Guarantee if unsatisfied.<br>Digital Product · Instant Download</div>`,
    imgs: ['assets/products/Product 16/1.webp','assets/products/Product 16/2.webp','assets/products/Product 16/3.webp','assets/products/Product 16/4.webp','assets/products/Product 16/5.webp','assets/products/Product 16/6.webp','assets/products/Product 16/7.webp','assets/products/Product 16/8.webp'],
    url: 'https://www.etsy.com/listing/4460905421/nova-pants-pdf-sewing-pattern-wide-leg'
  },
];

const colLeft  = document.getElementById('colLeft');
const colMid   = document.getElementById('colMid');
const colRight = document.getElementById('colRight');
const cols     = [colLeft, colMid, colRight];

function makeCard(p, i) {
  const wrap = document.createElement('div');
  wrap.className = 'card-reveal';

  const card = document.createElement('div');
  card.className = 'card-product';
  card.style.cursor = 'pointer';

  const src = (p.imgs[0]).replace(/ /g, '%20');
  card.innerHTML = `
    <img class="card-img" src="${src}" alt="${p.short}" loading="eager">
    <div class="card-scrim"></div>
    <div class="card-info">
      <div class="card-name">${p.short}</div>
      <div class="card-sub">View pattern</div>
      <div class="card-cta">
        <span class="card-btn">Open →</span>
        <a class="card-btn card-btn--buy" href="${p.url}" target="_blank" rel="noopener">Buy Now</a>
      </div>
    </div>
  `;

  card.querySelector('.card-btn--buy').addEventListener('click', e => e.stopPropagation());
  card.addEventListener('click', function(){if(!p.slug)return;window.location.href='products/'+p.slug+'.html';});
  wrap.appendChild(card);
  return wrap;
}

const grid = document.querySelector('.product-grid');
if (PRODUCTS.length === 1) {
  colLeft.style.display = 'none';
  colRight.style.display = 'none';
  grid.style.justifyContent = 'center';
  colMid.style.flex = '0 0 32%';
  colMid.style.maxWidth = '420px';
  colMid.appendChild(makeCard(PRODUCTS[0], 0));
} else if (PRODUCTS.length === 2) {
  colMid.style.display = 'none';
  grid.style.justifyContent = 'center';
  colLeft.style.flex = '0 0 32%';
  colLeft.style.maxWidth = '420px';
  colRight.style.flex = '0 0 32%';
  colRight.style.maxWidth = '420px';
  colLeft.appendChild(makeCard(PRODUCTS[0], 0));
  colRight.appendChild(makeCard(PRODUCTS[1], 1));
} else {
  PRODUCTS.forEach((p, i) => cols[i % 3].appendChild(makeCard(p, i)));
}

/* Fill last row so it always ends with 3 visible cards */
if (PRODUCTS.length >= 3) {
  const maxLen = Math.max(...cols.map(c => c.children.length));
  cols.forEach(col => {
    while (col.children.length < maxLen) {
      const clone = col.lastElementChild.cloneNode(true);
      col.appendChild(clone);
    }
  });
}

/* ── PAGE ENTRANCE: slides in from below only when arriving via scroll/nav ── */
if (sessionStorage.getItem('fromScroll')) {
  sessionStorage.removeItem('fromScroll');
  gsap.from(['.page-heading-wrap', '.grid-wrap'], {
    y: 80, duration: 0.85, ease: 'power3.out', stagger: 0.06, force3D: true
  });
}

gsap.set('#pageHeading', { yPercent: 105 });
gsap.to('#pageHeading', { yPercent: 0, duration: 1.15, ease: 'power3.out', delay: .1 });

gsap.to('#pageHeading', {
  yPercent: -25,
  ease: 'none',
  scrollTrigger: {
    trigger: '#pageHeader',
    start: 'top top',
    end: 'bottom top',
    scrub: true,
  }
});

gsap.to(['#colLeft', '#colRight'], {
  y: -600,
  ease: 'none',
  scrollTrigger: {
    trigger: document.documentElement,
    start: 'top top',
    end: 'bottom bottom',
    scrub: true,
  }
});

(function initModal() {
  const modal      = document.getElementById('prodModal');
  const pmMain     = document.getElementById('pmMain');
  const pmThumbs   = document.getElementById('pmThumbs');
  const pmTitle    = document.getElementById('pmTitle');
  const pmDesc     = document.getElementById('pmDesc');
  const pmBtn      = document.getElementById('pmBtn');
  const pmClose    = document.getElementById('pmClose');
  const pmBackdrop = document.getElementById('pmBackdrop');

  let activeImg = 0;
  let slicing    = false;

  function setImage(idx, imgs) {
    if (idx === activeImg || slicing) return;
    slicing = true;

    pmThumbs.querySelectorAll('.pm-thumb').forEach((t, i) => t.classList.toggle('is-active', i === idx));

    const N   = 30;
    const src = imgs[idx].replace(/ /g, '%20');

    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:absolute;inset:0;z-index:5;pointer-events:none;';

    const strips = [];
    for (let s = 0; s < N; s++) {
      const stripTop = (s / N * 100).toFixed(4);
      const stripH   = (100 / N).toFixed(4);

      const strip = document.createElement('div');
      strip.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${stripTop}%;`,
        `height:${stripH}%;`,
        'overflow:hidden;',
      ].join('');

      const inner = document.createElement('div');
      inner.style.cssText = [
        'position:absolute;left:0;right:0;',
        `top:${-(s * 100).toFixed(4)}%;`,
        `height:${N * 100}%;`,
        `background-image:url('${src}');`,
        'background-size:cover;',
        'background-position:center top;',
        'background-repeat:no-repeat;',
      ].join('');

      strip.appendChild(inner);
      overlay.appendChild(strip);
      strips.push(strip);
    }

    pmMain.appendChild(overlay);
    gsap.set(strips, { clipPath: 'inset(100% 0 0 0)' });

    const TOTAL_END  = 1.3;
    const STAGGER_GAP = 0.008;
    const reversed   = [...strips].reverse();

    const tl = gsap.timeline({
      onComplete() {
        const allImgs = pmMain.querySelectorAll('.pm-main-img');
        allImgs.forEach(el => { el.style.transition = 'none'; });
        allImgs.forEach((el, i) => el.classList.toggle('is-active', i === idx));
        requestAnimationFrame(() => {
          overlay.remove();
          allImgs.forEach(el => { el.style.transition = ''; });
          activeImg = idx;
          slicing   = false;
        });
      }
    });

    reversed.forEach((strip, i) => {
      const startAt  = i * STAGGER_GAP;
      const duration = TOTAL_END - startAt;
      tl.to(strip, { clipPath: 'inset(0% 0 0 0)', duration, ease: 'power2.out' }, startAt);
    });
  }

  window.openModal = function(p) {
    pmTitle.textContent = p.short;
    pmDesc.innerHTML    = p.desc;
    pmBtn.href          = p.url;

    pmMain.innerHTML = '';
    p.imgs.forEach((src, i) => {
      const img = document.createElement('img');
      img.className = 'pm-main-img' + (i === 0 ? ' is-active' : '');
      img.src = src.replace(/ /g, '%20');
      img.alt = p.short;
      pmMain.appendChild(img);
    });

    pmThumbs.innerHTML = '';
    p.imgs.forEach((src, i) => {
      const thumb = document.createElement('img');
      thumb.className = 'pm-thumb' + (i === 0 ? ' is-active' : '');
      thumb.src = src.replace(/ /g, '%20');
      thumb.alt = p.short;
      thumb.addEventListener('click', () => setImage(i, p.imgs));
      pmThumbs.appendChild(thumb);
    });

    activeImg = 0;
    modal.classList.add('is-open');
    document.body.style.overflow = 'hidden';

    const pmLeft  = modal.querySelector('.pm-left');
    const pmRight = modal.querySelector('.pm-right');
    gsap.killTweensOf([pmLeft, pmRight]);

    gsap.fromTo(pmBackdrop, { opacity: 0 }, { opacity: 1, duration: 0.6, ease: 'power2.out' });

    const firstImg = pmMain.querySelector('.pm-main-img.is-active');
    const startReveal = () => {
      gsap.fromTo(pmLeft,
        { clipPath: 'inset(0 100% 0 0)' },
        { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power3.out' }
      );
      gsap.fromTo(pmRight,
        { clipPath: 'inset(0 100% 0 0)' },
        { clipPath: 'inset(0 0% 0 0)', duration: 0.9, ease: 'power3.out', delay: 0.85 }
      );
    };
    if (firstImg && !firstImg.complete) {
      firstImg.decode().then(startReveal).catch(startReveal);
    } else {
      startReveal();
    }

    pmTitle.innerHTML = [...p.short].map(ch =>
      `<span style="display:inline-block;overflow:hidden;vertical-align:bottom;line-height:1.3"><span style="display:inline-block;will-change:transform">${ch === ' ' ? '&nbsp;' : ch}</span></span>`
    ).join('');
    const titleChars = pmTitle.querySelectorAll('span > span');

    gsap.set(titleChars,                                    { yPercent: 110 });
    gsap.set([pmDesc, pmBtn],                               { opacity: 0, y: 20 });
    gsap.set(pmRight.querySelector('.pm-brand img'),        { opacity: 0, y: 12 });
    gsap.set(pmRight.querySelector('.pm-divider'),          { opacity: 0 });

    gsap.timeline({ defaults: { ease: 'power3.out' } })
      .to(pmRight.querySelector('.pm-brand img'), { opacity: 1, y: 0, duration: .6 },             1.0)
      .to(titleChars,                             { yPercent: 0, duration: 1.0, stagger: 0.028 }, 1.25)
      .to(pmRight.querySelector('.pm-divider'),   { opacity: 1, duration: .4 },                   1.6)
      .to(pmDesc,                                 { opacity: 1, y: 0, duration: .9 },             1.7)
      .to(pmBtn,                                  { opacity: 1, y: 0, duration: .6 },             2.0);
  };

  function closeModal() {
    const pmLeft  = modal.querySelector('.pm-left');
    const pmRight = modal.querySelector('.pm-right');
    gsap.killTweensOf([pmLeft, pmRight]);
    modal.style.transition = 'none';

    const tl = gsap.timeline({
      onComplete() {
        modal.style.opacity      = '0';
        modal.style.visibility   = 'hidden';
        modal.style.transition   = 'none';
        modal.classList.remove('is-open');
        modal.style.overflow     = '';
        document.body.style.overflow = '';
        requestAnimationFrame(() => {
          gsap.set(pmLeft,     { clearProps: 'all' });
          gsap.set(pmRight,    { clearProps: 'all' });
          gsap.set(pmBackdrop, { opacity: 0 });
          modal.style.opacity    = '';
          modal.style.visibility = '';
          modal.style.transition = '';
        });
      }
    });

    modal.style.overflow = 'hidden';
    tl.to(pmBackdrop, { opacity: 0, duration: 0.5, ease: 'power2.in' }, 0.4);
    tl.to(pmLeft, { x: pmLeft.offsetWidth, duration: 0.5, ease: 'power2.inOut' }, 0);
    tl.set(pmLeft, { visibility: 'hidden' }, 0.45);
    tl.to(pmRight, { x: window.innerWidth, duration: 0.9, ease: 'power3.in' }, 0.45);
  }

  pmClose.addEventListener('click', closeModal);
  modal.addEventListener('click', e => { if (e.target === modal) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && modal.classList.contains('is-open')) closeModal(); });
})();

(function initSideNav() {
  const PAGES = [
    { name: 'Jackets',  sub: 'Quilted',  url: 'jackets.html'  },
    { name: 'Vests',    sub: 'Knitted',  url: 'vests.html'    },
    { name: 'Blouses',  sub: 'Woven',    url: 'blouses.html'  },
    { name: 'Pants',    sub: 'Tailored', url: 'pants.html'    },
    { name: 'Shop All', sub: 'All',      url: 'shop-all.html' },
  ];

  const filename = window.location.pathname.split('/').pop() || 'pants.html';
  let currentIdx = PAGES.findIndex(p => p.url === filename);
  if (currentIdx < 0) currentIdx = 3;

  const prevIdx = currentIdx - 1;
  const nextIdx = (currentIdx + 1) % PAGES.length;
  const nav     = document.getElementById('sideNav');

  function render(cIdx, nIdx) {
    nav.innerHTML = '';
    const elems = [];

    if (prevIdx >= 0) {
      const prev = document.createElement('div');
      prev.className = 'side-nav-item is-prev';
      prev.innerHTML = `<span class="side-nav-name">${PAGES[prevIdx].name}</span>`;
      prev.addEventListener('click', () => {
        sessionStorage.setItem('fromScroll', '1');
        gsap.to(['.grid-wrap', 'footer'], { y: -80, opacity: 0, duration: 0.5, ease: 'power2.in' });
        gsap.to(elems, { y: -50, opacity: 0, duration: .45, ease: 'power2.in', stagger: .08,
          onComplete() { window.location.href = PAGES[prevIdx].url; }
        });
      });
      nav.appendChild(prev);
      elems.push(prev);
    }

    const active = document.createElement('div');
    active.className = 'side-nav-item is-active';
    active.innerHTML = `<span class="side-nav-name">${PAGES[cIdx].name}</span>`;
    nav.appendChild(active);
    elems.push(active);

    const next = document.createElement('div');
    next.className = 'side-nav-item is-next';
    next.innerHTML = `<span class="side-nav-name">${PAGES[nIdx].name}</span>`;
    nav.appendChild(next);
    elems.push(next);

    gsap.from(elems, {
      y: 40, opacity: 0, duration: .9, ease: 'power3.out', stagger: .12
    });

    next.addEventListener('click', () => {
      sessionStorage.setItem('fromScroll', '1');
      gsap.to(['.grid-wrap', 'footer'], {
        y: -80, opacity: 0, duration: 0.5, ease: 'power2.in'
      });
      gsap.to(elems, {
        y: -50, opacity: 0, duration: .45, ease: 'power2.in', stagger: .08,
        onComplete() { window.location.href = PAGES[nIdx].url; }
      });
    });
  }

  render(currentIdx, nextIdx);

  /* hide side-nav before it overlaps the footer */
  (function() {
    const footer = document.getElementById('site-footer');
    if (!footer || !nav) return;
    const io = new IntersectionObserver(function(entries) {
      const visible = entries[0].isIntersecting;
      gsap.to(nav, {
        opacity: visible ? 0 : 1,
        y:       visible ? 12 : 0,
        duration: 0.4,
        ease: 'power2.inOut',
        overwrite: 'auto'
      });
    }, { threshold: 0.04 });
    io.observe(footer);
  })();

})();

/* ── PAGE STARS ── */
(function() {
  var container = document.getElementById('page-stars');
  if (!container) return;
  var marks = ['×', '+', '◊', '·', '✶', '✦', '✧', '⋆', '★', '✵', '✴', '✸', '*', '⁎', '✺', '✻'];
  var anims  = ['yt-float', 'yt-twinkle', 'yt-drift'];
  for (var i = 0; i < 80; i++) {
    var dot  = document.createElement('span');
    var sz   = (Math.random() * 10 + 5).toFixed(0);
    var op   = (Math.random() * 0.18 + 0.04).toFixed(2);
    var dur  = (Math.random() * 3 + 0.8).toFixed(1);
    var del  = (Math.random() * 22).toFixed(1);
    var anim = anims[Math.floor(Math.random() * anims.length)];
    dot.textContent = marks[Math.floor(Math.random() * marks.length)];
    dot.style.cssText = [
      'position:absolute',
      'font-family:serif',
      'font-size:' + sz + 'px',
      'color:rgba(249,240,236,' + op + ')',
      'left:' + (Math.random() * 100).toFixed(1) + '%',
      'top:' + (Math.random() * 100).toFixed(1) + '%',
      'animation:' + anim + ' ' + dur + 's ease-in-out infinite alternate',
      'animation-delay:-' + del + 's',
      'pointer-events:none',
      'user-select:none',
      'will-change:transform'
    ].join(';');
    container.appendChild(dot);
  }
})();

</script>

<footer class="page-footer">
  <span class="footer-logo">LU2COHOUSE</span>
  <span class="footer-copy">&copy; 2025 LU2COHOUSE. All rights reserved.</span>

    </div>
  </div>
</footer>

<script>
(function(){
  var o=document.getElementById('page-overlay');
  if(!o)return;
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){
      o.style.transition='opacity 0.35s ease';
      o.style.opacity='0';
    });
  });
  window.addEventListener('pageshow',function(e){
    if(!e.persisted)return;
    o.style.transition='none';
    o.style.opacity='0';
    o.style.pointerEvents='none';
    requestAnimationFrame(function(){
      o.style.transition='opacity 0.35s ease';
    });
  });
  document.addEventListener('click',function(e){
    var a=e.target.closest('a[href]');
    if(!a)return;
    var href=a.getAttribute('href');
    if(!href||href.startsWith('http')||href.startsWith('#')||href.startsWith('mailto')||a.target==='_blank')return;
    e.preventDefault();
    o.style.transition='opacity 0.28s ease';
    o.style.opacity='1';
    o.style.pointerEvents='all';
    setTimeout(function(){window.location.href=href;},290);
  });
})();
</script>
